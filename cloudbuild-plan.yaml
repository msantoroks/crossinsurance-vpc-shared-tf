# Cloud Build — Terraform PLAN
#
# One trigger per workload project (test-01..04). Each trigger lives in its
# own GCP project and overrides _STACK via --substitutions=_STACK=test-XX.
# All triggers share the same identity: sa-terraform-ci@<shared-project>.
#
# See docs/cross-cloudbuild-setup.md for the trigger creation script.

substitutions:
  _STACK: test-01

steps:
  - id: "tf-fmt-check"
    name: "hashicorp/terraform:1.14.8"
    entrypoint: "sh"
    args:
      - "-c"
      - "terraform fmt -recursive -check"

  - id: "tf-plan"
    name: "hashicorp/terraform:1.14.8"
    entrypoint: "sh"
    env:
      - "BUILD_ID=${BUILD_ID}"
    args:
      - "-c"
      - |
        set -euo pipefail
        # The hashicorp/terraform image is Alpine-based and ships only sh/jq.
        # We need:
        #   - bash      → deploy.sh has `#!/usr/bin/env bash` shebang
        #   - python3   → cidr_validation module shells out via data.external
        #   - jq        → connect-project.sh fallback (and generally useful)
        #   - google-cloud-storage → cidr_registry_gcs_sync.py prefers the lib
        apk add --no-cache bash python3 py3-pip jq
        pip install --break-system-packages --root-user-action=ignore --quiet google-cloud-storage
        cd ${_STACK}
        ./deploy.sh plan

options:
  logging: CLOUD_LOGGING_ONLY
  defaultLogsBucketBehavior: REGIONAL_USER_OWNED_BUCKET
